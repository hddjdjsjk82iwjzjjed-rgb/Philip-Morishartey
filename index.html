<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Irish Potato Tribute</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #3a5a40, #a3b18a);
        color: white;
        text-align: center;
    }

    .container {
        padding: 40px;
        max-width: 1000px;
        margin: auto;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 20px;
    }

    .potato-img {
        width: 80%;
        max-width: 600px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .caption {
        font-size: 28px;
        margin-top: 15px;
        font-weight: bold;
    }

    .subtitle {
        font-size: 22px;
        margin-top: 10px;
        opacity: 0.9;
    }

    audio {
        margin-top: 30px;
    }
</style>

</head>

<body>

<div class="container">

    <h1>The Irish Potato</h1>

    <img class="potato-img" src="your-image.jpg" alt="Irish Potato Image">

    <div class="caption">The GREAT Irish Famine</div>

    <div class="subtitle">Those who don’t know… those who know.</div>

    <!-- Background Music -->
    <audio controls autoplay loop>
        <source src="your-music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

</div>

</body>
</html>
